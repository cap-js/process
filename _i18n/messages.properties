# =============================================================================
# Process Plugin Error Messages
# =============================================================================

# -----------------------------------------------------------------------------
# Process Handler Validation Errors
# -----------------------------------------------------------------------------
MISSING_REQUIRED_PARAM_INPUTS = Missing required parameter: inputs
MISSING_REQUIRED_PARAM_BUSINESS_KEY = Missing required parameter: businessKey

# -----------------------------------------------------------------------------
# Process Start Errors
# -----------------------------------------------------------------------------
PROCESS_START_FETCH_FAILED = Failed to fetch entity for process start.
PROCESS_START_INVALID_KEY = Failed to build business key for process start.
PROCESS_START_FAILED = Failed to start process with definition ID {0}.
PROCESS_START_CYCLE_DETECTED = Cycle detected in @build.process.input annotations: {0}

# -----------------------------------------------------------------------------
# Process Cancel Errors
# -----------------------------------------------------------------------------
PROCESS_CANCEL_FETCH_FAILED = Failed to fetch entity for process cancellation.
PROCESS_CANCEL_INVALID_KEY = Failed to build business key for process cancellation.
PROCESS_CANCEL_EMPTY_KEY = Business key is empty for process cancellation.
PROCESS_CANCEL_FAILED = Failed to cancel process with business key {0}.

# -----------------------------------------------------------------------------
# Process Suspend Errors
# -----------------------------------------------------------------------------
PROCESS_SUSPEND_FETCH_FAILED = Failed to fetch entity for process suspend.
PROCESS_SUSPEND_INVALID_KEY = Failed to build business key for process suspend.
PROCESS_SUSPEND_EMPTY_KEY = Business key is empty for process suspend.
PROCESS_SUSPEND_FAILED = Failed to suspend process with business key {0}.

# -----------------------------------------------------------------------------
# Process Resume Errors
# -----------------------------------------------------------------------------
PROCESS_RESUME_FETCH_FAILED = Failed to fetch entity for process resume.
PROCESS_RESUME_INVALID_KEY = Failed to build business key for process resume.
PROCESS_RESUME_EMPTY_KEY = Business key is empty for process resume.
PROCESS_RESUME_FAILED = Failed to resume process with business key {0}.

# -----------------------------------------------------------------------------
# Workflow Client Errors
# -----------------------------------------------------------------------------
WORKFLOW_START_FAILED = Failed to start workflow: {0}
WORKFLOW_RETRIEVE_FAILED = Failed to retrieve workflow instances: {0}
WORKFLOW_UPDATE_FAILED = Failed to update workflow instance: {0}

# -----------------------------------------------------------------------------
# Authentication Errors
# -----------------------------------------------------------------------------
AUTH_EMPTY_JWT = Empty JWT returned from XSUAA authorization service.
AUTH_MISSING_UAA_CREDENTIALS = Missing UAA credentials for XSUAA token provider.
AUTH_MISSING_BINDING_CREDENTIALS = Missing binding credentials for service: {0}
AUTH_TOKEN_FETCH_FAILED = Error during token fetching.

# -----------------------------------------------------------------------------
# Process Import Errors
# -----------------------------------------------------------------------------
IMPORT_NO_CREDENTIALS = No ProcessService credentials found. Run with: cds bind --exec -- ...
IMPORT_NO_API_URL = No API URL found in ProcessService credentials.
IMPORT_ARRAY_NO_ITEMS = Array {0}.{1} has no 'items'.
IMPORT_NESTED_ARRAY_NO_ITEMS = Nested array under {0} missing 'items'.

# -----------------------------------------------------------------------------
# Process API Client Errors
# -----------------------------------------------------------------------------
API_REQUEST_FAILED = API request failed: {0} {1}

# =============================================================================
# Build Validation Messages
# =============================================================================

# -----------------------------------------------------------------------------
# Annotation Validation
# -----------------------------------------------------------------------------
BUILD_WARNING_UNKNOWN_ANNOTATION = {0}: Unknown annotation ''{1}''. Allowed annotations are: {2}
BUILD_ERROR_ANNOTATION_MUST_BE_STRING = {0}: {1} must be a string representing a lifecycle event or action name
BUILD_ERROR_ANNOTATION_MUST_BE_EVENT_OR_ACTION = {0}: {1} must be either a lifecycle event (CREATE, UPDATE, DELETE) or an action defined on the entity
BUILD_ERROR_IF_MUST_BE_EXPRESSION = {0}: {1} must be a valid expression

# -----------------------------------------------------------------------------
# Start Annotation Validation
# -----------------------------------------------------------------------------
BUILD_ERROR_START_ON_REQUIRES_ID = {0}: {1} requires {2}
BUILD_ERROR_START_ID_REQUIRES_ON = {0}: {1} requires {2}
BUILD_ERROR_START_ID_MUST_BE_STRING = {0}: {1} must be a string
BUILD_WARNING_NO_PROCESS_DEFINITION = {0}: No process definition found for {1} ''{2}''. Process inputs cannot be validated!

# -----------------------------------------------------------------------------
# Generic Lifecycle Annotation Validation
# -----------------------------------------------------------------------------
BUILD_ERROR_ANNOTATION_REQUIRES_OTHER = {0}: {1} requires {2}
BUILD_ERROR_CASCADE_MUST_BE_BOOLEAN = {0}: {1} must be a boolean

# -----------------------------------------------------------------------------
# Input Validation
# -----------------------------------------------------------------------------
BUILD_ERROR_START_BUSINESSKEY_INPUT_MISSING = {0}: Process definition ''{1}'' requires a ''businesskey'' input but it is not provided
BUILD_ERROR_ATTRIBUTE_NOT_IN_PROCESS_DEF = {0}: Entity attribute ''{1}'' is not defined in process definition ''{2}''
BUILD_WARNING_TYPE_MISMATCH = {0}: Type mismatch for ''{1}'': entity has ''{2}'' but process definition expects ''{3}''
BUILD_WARNING_ARRAY_MISMATCH = {0}: Array mismatch for ''{1}'': entity is {2} but process definition expects {3}
BUILD_ERROR_MISSING_PROCESS_INPUT = {0}: Process definition ''{1}'' expects input ''{2}'' but it is not provided by the entity
BUILD_WARNING_MANDATORY_MISMATCH = {0}: Input ''{1}'' is mandatory in process definition ''{2}'' but not marked as @mandatory in the entity
BUILD_ERROR_MISSING_MANDATORY_PROCESS_INPUT = {0}: Mandatory input ''{1}'' from process definition ''{2}'' is missing in the entity

# -----------------------------------------------------------------------------
# Association Validation
# -----------------------------------------------------------------------------
BUILD_ERROR_CYCLE_DETECTED = Cycle detected in entity associations at ''{0}''. This is not supported.

# -----------------------------------------------------------------------------
# Misc Build Warnings
# -----------------------------------------------------------------------------
BUILD_WARNING_INPUTS_NOT_VALIDATED = Inputs for {0} are not validated against process definition {1}