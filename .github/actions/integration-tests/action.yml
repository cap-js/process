name: 'Integration tests'
description: 'Run tests with BTP services being bound'
inputs:
  CF_API:
    description: 'Cloud Foundry API endpoint'
    required: true
  CF_USERNAME:
    description: 'Cloud Foundry username'
    required: true
  CF_PASSWORD:
    description: 'Cloud Foundry password'
    required: true
  CF_ORG:
    description: 'Cloud Foundry organization'
    required: true
  CF_SPACE:
    description: 'Cloud Foundry space'
    required: true
  NODE_VERSION:
    description: 'Node.js version to use for tests'
    required: true
  PROFILE:
    description: 'Test profile to use (hana or hana-process)'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Install dependencies and Cloud Foundry CLI (v8.9.0)
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libc6 wget tar
        wget "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=8.9.0&source=github-rel" -O cf-cli.tar.gz
        tar -xvzf cf-cli.tar.gz
        sudo mv cf /usr/local/bin/
        sudo mv cf8 /usr/local/bin/
        cf --version

    # BTP Auth
    - name: Authenticate with Cloud Foundry
      shell: bash
      run: |
        echo "::debug::CF_API=${{ inputs.CF_API }}"
        for i in {1..3}; do
          cf login -a ${{ inputs.CF_API }} -u ${{ inputs.CF_USERNAME }} -p ${{ inputs.CF_PASSWORD }} -o ${{ inputs.CF_ORG }} -s ${{ inputs.CF_SPACE }} && break
          echo "cf login failed, retrying ($i/3)..."
          sleep 10
          if [ "$i" -eq 3 ]; then
            echo "❌ cf login failed after 3 attempts."
            exit 1
          fi
        done

    - uses: actions/checkout@v5
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
    - name: Use Node.js ${{ inputs.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.NODE_VERSION }}

    - name: Install global CDS
      shell: bash
      run: npm i -g @sap/cds-dk@${{ matrix.cds-version }}
    - name: Install root dependencies
      shell: bash
      run: |
        npm install @sap/cds@${{ matrix.cds-version }}
        npm install

    - name: Compile TypeScript to dist
      shell: bash
      run: npm run compile

    # HANA Cloud Deployment and binding
    - name: Set node env for HANA
      run: echo "NODE_VERSION_HANA=$(echo ${{ inputs.NODE_VERSION }} | tr . _)" >> $GITHUB_ENV
      shell: bash
    # Deploy model to HANA
    - name: Create HDI Container
      shell: bash
      run: cf create-service hana hdi-shared cap-js-process-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}-$NODE_VERSION_HANA-${{ matrix.cds-version }}-${{ inputs.PROFILE }}
    - run: cd tests/bookshop/ && cds deploy --to hana:cap-js-process-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}-$NODE_VERSION_HANA-${{ matrix.cds-version }}-${{ inputs.PROFILE }}
      shell: bash
    # Bind HANA Cloud instance
    - name: Bind -2 HANA
      run: |
        if [ "${{ inputs.PROFILE }}" = "hana-process" ]; then
          cds bind db -2 cap-js-process-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}-$NODE_VERSION_HANA-${{ matrix.cds-version }}-${{ inputs.PROFILE }} -o package.json && cd tests/bookshop && cds bind db -2 cap-js-process-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}-$NODE_VERSION_HANA-${{ matrix.cds-version }}-${{ inputs.PROFILE }}
        else
          cds bind db -2 cap-js-process-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}-$NODE_VERSION_HANA-${{ matrix.cds-version }}-${{ inputs.PROFILE }} -o package.json -4 hana
        fi
      shell: bash

    # Bind against BTP services
    - name: Bind -2 process
      if: ${{ inputs.PROFILE == 'hana-process' }}
      run: cds bind ProcessService -2 sbpa-service-instance -o package.json && cd tests/bookshop && cds bind ProcessService -2 sbpa-service-instance
      shell: bash
    - name: Import process
      if: ${{ inputs.PROFILE == 'hana-process' }}
      run: npm run import:process
      shell: bash
    - name: Generate Types for sample project
      shell: bash
      run: cd tests/bookshop && npm run cds-typer
    # Run tests
    - name: Run tests
      run: |
        if [ "${{ inputs.PROFILE }}" = "hana-process" ]; then
          cds bind --exec -- npm run test:hybrid
        else
          cds bind --exec --profile hana -- npm run test:hana
        fi
      shell: bash

    # HANA Cleanup
    - name: Delete HDI Container Key
      if: ${{ always() }}
      run: cf delete-service-key cap-js-process-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}-$NODE_VERSION_HANA-${{ matrix.cds-version }}-${{ inputs.PROFILE }} cap-js-process-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}-$NODE_VERSION_HANA-${{ matrix.cds-version }}-${{ inputs.PROFILE }}-key -f
      shell: bash
    # Somehow first delete always fails with a "ongoing operation on service binding" error
    - name: Delete HDI Container
      if: ${{ always() }}
      shell: bash
      run: |
        for i in {1..3}; do
          cf delete-service cap-js-process-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}-$NODE_VERSION_HANA-${{ matrix.cds-version }}-${{ inputs.PROFILE }} -f && break
          echo "HDI container delete failed, retrying ($i/3)..."
          sleep 10
          if [ "$i" -eq 3 ]; then
            echo "❌ HDI container delete failed after 3 attempts."
            exit 1
          fi
        done
