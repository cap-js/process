<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookshop Launchpad</title>

    <script>
        window["sap-ushell-config"] = {
            defaultRenderer: "fiori2",
            applications: {
                "books-manage": {
                    title: "Manage Books",
                    description: "Books Fiori Elements App",
                    additionalInformation: "SAPUI5.Component=books",
                    applicationType: "URL",
                    url: "/books",
                    navigationMode: "embedded"
                },
                "authors-manage": {
                    title: "Manage Authors",
                    description: "Authors Fiori Elements App",
                    additionalInformation: "SAPUI5.Component=authors",
                    applicationType: "URL",
                    url: "/authors",
                    navigationMode: "embedded"
                }
            }
        };
    </script>

    <script
        id="sap-ushell-bootstrap"
        src="https://ui5.sap.com/1.146.0/test-resources/sap/ushell/bootstrap/sandbox.js"
    ></script>

    <script
        id="sap-ui-bootstrap"
        src="https://ui5.sap.com/1.146.0/resources/sap-ui-core.js"
        data-sap-ui-libs="sap.m, sap.ushell, sap.fe.templates"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-frameOptions="allow"
        data-sap-ui-bindingSyntax="complex"
    ></script>

    <script>
        sap.ui.getCore().attachInit(function () {
            sap.ushell.Container.createRenderer().placeAt("content");
        });
    </script>
</head>
<body class="sapUiBody" id="content"></body>
</html>
